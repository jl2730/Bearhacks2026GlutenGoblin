<!DOCTYPE html>
<html>
<head>
  <title>Gluten Goblin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <main class="app">

    <!-- SCAN PAGE -->
    <section id="scanPage">
      <section class="hero">
        <div class="badge">Celiac-friendly label helper</div>
        <h1>Gluten Goblin</h1>
        <p class="tagline">Scan the snack. Let the goblin decide.</p>
      </section>

      <section class="card">
        <h2>📸 Scan Product</h2>
        <p class="helper">Take a photo of the front and back of the package for the best result.</p>

        <div class="photo-grid">
          <div class="photo-box">
            <p>Front of Package</p>
            <img id="frontPreview" class="preview" style="display:none;" />
            <button onclick="document.getElementById('frontInput').click()">Take Front Photo</button>
          </div>

          <div class="photo-box">
            <p>Back / Ingredients</p>
            <img id="backPreview" class="preview" style="display:none;" />
            <button onclick="document.getElementById('backInput').click()">Take Back Photo</button>
          </div>
        </div>

        <input type="file" accept="image/*" capture="environment" id="frontInput" style="display:none;">
        <input type="file" accept="image/*" capture="environment" id="backInput" style="display:none;">

        <button id="analyzeBtn" class="main-btn" style="display:none;">👹 Ask the Goblin</button>
      </section>
    </section>

    <!-- RESULT PAGE -->
    <section id="resultPage" class="result-card" style="display:none;">
      <video id="goblinVideo" autoplay muted loop playsinline></video>

      <audio id="safeAudio" src="/static/audio/safe.mp3" preload="auto"></audio>
      <audio id="cautionAudio" src="/static/audio/caution.mp3" preload="auto"></audio>
      <audio id="avoidAudio" src="/static/audio/avoid.mp3" preload="auto"></audio>

      <div id="result"></div>

      <button class="secondary-btn" onclick="location.reload()">Scan Another Product</button>
    </section>

  </main>

  <!-- LOADING POPUP -->
  <div id="loadingModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="spinner">👹</div>
      <h2>Goblin is inspecting...</h2>
      <p>Reading ingredients, warnings, and sneaky gluten clues.</p>
    </div>
  </div>

  <script>
    let audioUnlocked = false;
    let frontFile = null;
    let backFile = null;

    const frontPreview = document.getElementById("frontPreview");
    const backPreview = document.getElementById("backPreview");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const goblinVideo = document.getElementById("goblinVideo");
    const resultDiv = document.getElementById("result");

    function showPage(pageName) {
      document.getElementById("scanPage").style.display = pageName === "scan" ? "block" : "none";
      document.getElementById("resultPage").style.display = pageName === "result" ? "block" : "none";
    }

    function showLoading() {
      document.getElementById("loadingModal").style.display = "flex";
    }

    function hideLoading() {
      document.getElementById("loadingModal").style.display = "none";
    }

    function unlockAudio() {
      if (audioUnlocked) return;

      const audios = [
        document.getElementById("safeAudio"),
        document.getElementById("cautionAudio"),
        document.getElementById("avoidAudio")
      ];

      audios.forEach(audio => {
        audio.muted = true;
        audio.play()
          .then(() => {
            audio.pause();
            audio.currentTime = 0;
            audio.muted = false;
          })
          .catch(() => {
            audio.muted = false;
          });
      });

      audioUnlocked = true;
    }

    document.body.addEventListener("click", unlockAudio, { once: true });
    document.body.addEventListener("touchstart", unlockAudio, { once: true });

    async function playGoblin(status) {
      const safeAudio = document.getElementById("safeAudio");
      const cautionAudio = document.getElementById("cautionAudio");
      const avoidAudio = document.getElementById("avoidAudio");

      status = status.toUpperCase();

      safeAudio.pause();
      cautionAudio.pause();
      avoidAudio.pause();

      safeAudio.currentTime = 0;
      cautionAudio.currentTime = 0;
      avoidAudio.currentTime = 0;

      let audioToPlay;

      if (status === "SAFE") {
        goblinVideo.src = "/static/videos/goblin-happy.mp4";
        audioToPlay = safeAudio;
      } else if (status === "AVOID") {
        goblinVideo.src = "/static/videos/goblin-scream.mp4";
        audioToPlay = avoidAudio;
      } else {
        goblinVideo.src = "/static/videos/goblin-caution.mp4";
        audioToPlay = cautionAudio;
      }

      goblinVideo.style.display = "block";
      goblinVideo.load();

      try {
        await goblinVideo.play();
      } catch (e) {
        console.log("Video play error:", e);
      }

      audioToPlay.pause();
      audioToPlay.currentTime = 0;
      audioToPlay.load();

      setTimeout(() => {
        audioToPlay.play().catch(error => {
          console.log("Audio play error:", error);
        });
      }, 100);
    }

    async function showResult(data) {
      showPage("result");

      resultDiv.innerHTML = `
        <div class="answer">
          <h2>${data.headline || data.status}</h2>
          <h3>${data.product_name || ""}</h3>
          <p class="goblin-line">${data.goblin_message}</p>
          <div class="explanation">${data.explanation}</div>
        </div>
      `;

      await playGoblin(data.status);
    }

    function checkPhotosReady() {
      if (frontFile && backFile) {
        analyzeBtn.style.display = "block";
      }
    }

    document.getElementById("frontInput").addEventListener("change", function () {
      frontFile = this.files[0];

      if (frontFile) {
        frontPreview.src = URL.createObjectURL(frontFile);
        frontPreview.style.display = "block";
        checkPhotosReady();
      }
    });

    document.getElementById("backInput").addEventListener("change", function () {
      backFile = this.files[0];

      if (backFile) {
        backPreview.src = URL.createObjectURL(backFile);
        backPreview.style.display = "block";
        checkPhotosReady();
      }
    });

    analyzeBtn.addEventListener("click", async function () {
      const formData = new FormData();
      formData.append("front_image", frontFile);
      formData.append("back_image", backFile);

      showLoading();

      const response = await fetch("/analyze", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      hideLoading();
      await showResult(data);
    });
  </script>
</body>
</html>
